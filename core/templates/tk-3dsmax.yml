paths:
  ##########################################################################################
  # Shot level paths
  #

  # define the location of a work area
  shot_work_area_max:
      definition: '@shot_root/3dsmax'
  # define the location of a publish area
  shot_publish_area_max:
      definition: '@shot_publish/3dsmax'
  # The location of WIP files
  max_shot_work:
      definition: '@shot_root/3dsmax/{Projectcode}_sc{Sequence}_{Shot}_{Step}_work_{name}_v{version}.max'
  # The location of backups of WIP files
  max_shot_snapshot:
      definition: '@shot_root/3dsmax/snapshots/{Projectcode}_sc{Sequence}_{Shot}_{Step}_snap_{name}_v{version}_{timestamp}.max'
  # The location of published max files
  max_shot_publish:
      definition: '@shot_publish/3dsmax/{Projectcode}_sc{Sequence}_{Shot}_{Step}_pub_{name}_v{version}.max'

  ##########################################################################################
  # Asset pipeline
  #

  # define the location of a work area
  asset_work_area_max:
      definition: '@asset_root/3dsmax'
  # define the location of a publish area
  asset_publish_area_max:
      definition: '@asset_publish/3dsmax'
  # The location of WIP files
  max_asset_work:
      definition: '@asset_root/3dsmax/{Projectcode}_{Asset}_{Step}_{name}_work_v{version}.max'
  # The location of backups of WIP files
  max_asset_snapshots:
      definition: '@asset_root/3dsmax/snapshots/{Projectcode}_{Asset}_{Step}_{name}_snap_v{version}_{timestamp}.{timestamp}.max'
  # The location of published max files
  max_asset_publish:
      definition: '@asset_publish/3dsmax/{Projectcode}_{Asset}_{Step}_{name}_pub_v{version}.max'

